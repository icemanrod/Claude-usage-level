name: ClaudeUsageLevel
options:
  bundleIdPrefix: com.usagelevel
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  ClaudeUsageLevel:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "*.entitlements"
          - "Info.plist"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.usagelevel.claude-usage-level
        PRODUCT_NAME: Claude Usage Level
        MARKETING_VERSION: "2.25.3"
        CURRENT_PROJECT_VERSION: "44"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: Sources/ClaudeUsageLevel.entitlements
      properties:
        com.apple.security.network.client: true
    dependencies:
      - target: ClaudeUsageLevelWidget
        embed: true

  ClaudeUsageLevelWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget
        excludes:
          - "Info.plist"
    info:
      path: Widget/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.usagelevel.claude-usage-level.widget
        PRODUCT_NAME: ClaudeUsageLevelWidget
        MARKETING_VERSION: "2.25.3"
        CURRENT_PROJECT_VERSION: "44"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: NO
